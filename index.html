<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perangkat Guru AI — Pembuat Administrasi & Media Pembelajaran</title>
  <meta name="description" content="Buat kelengkapan administrasi guru dan media pembelajaran dengan AI sesuai standar Kurikulum Merdeka." />
  <meta name="keywords" content="rpp ai, modul ajar ai, administrasi guru, teka teki silang, kurikulum merdeka AI" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>" />
  <link rel="stylesheet" href="/src/styles/index.css" />
</head>
<body>
  <div id="app">

    <!-- ====== HEADER ====== -->
    <header id="app-header">
      <div class="header-left">
        <button class="icon-btn" id="btn-home" title="Menu Utama">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>
        <div class="logo">
          <span class="logo-icon">📚</span>
          <h1 class="logo-text">Perangkat <span class="gradient-text">Guru AI</span></h1>
        </div>
      </div>
      <div class="header-center">
        <div class="project-name" id="project-name"></div>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="btn-settings" title="Pengaturan AI">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button class="icon-btn" id="btn-projects" title="Proyek Saya">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
        </button>
      </div>
    </header>

    <!-- ====== API USAGE INDICATOR ====== -->
    <div id="usage-indicator" class="usage-indicator">
      <div class="usage-dot" style="background: #10b981;"></div>
      <div class="usage-stats">
        <span class="usage-stat"><span class="usage-label">RPM</span> <span class="usage-value">0/15</span></span>
        <span class="usage-stat"><span class="usage-label">RPD</span> <span class="usage-value">0/500</span></span>
        <span class="usage-stat"><span class="usage-label">TPM</span> <span class="usage-value">0/250K</span></span>
      </div>
    </div>

    <!-- ====== WIZARD PROGRESS (hidden by default, shown for document wizard) ====== -->
    <nav id="wizard-progress" style="display:none;">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="steps">
        <div class="step active" data-step="0">
          <div class="step-circle"><span class="step-number">1</span><span class="step-check">✓</span></div>
          <span class="step-label">Isi Data</span>
        </div>
        <div class="step" data-step="1">
          <div class="step-circle"><span class="step-number">2</span><span class="step-check">✓</span></div>
          <span class="step-label">Generate</span>
        </div>
        <div class="step" data-step="2">
          <div class="step-circle"><span class="step-number">3</span><span class="step-check">✓</span></div>
          <span class="step-label">Download</span>
        </div>
      </div>
    </nav>

    <!-- ====== MAIN CONTENT ====== -->
    <main id="wizard-content">
      <div class="loading-screen" id="loading-screen">
        <div class="loading-spinner"></div>
        <p>Memuat aplikasi...</p>
      </div>
    </main>

    <!-- ====== WIZARD NAVIGATION (hidden by default) ====== -->
    <footer id="wizard-nav" style="display:none;">
      <button class="btn btn-ghost" id="btn-prev" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        <span>Sebelumnya</span>
      </button>
      <div class="nav-info" id="nav-info">Langkah 1 dari 3</div>
      <button class="btn btn-primary" id="btn-next">
        <span>Selanjutnya</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </footer>

    <!-- ====== TOAST CONTAINER ====== -->
    <div id="toast-container"></div>

    <!-- ====== MODAL CONTAINER ====== -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal" id="modal">
        <div class="modal-header" id="modal-header"></div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer"></div>
      </div>
    </div>

  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
